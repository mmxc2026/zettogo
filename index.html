<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettogo E-commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="zettogo-logo.png" alt="Zettogo Logo">
        <h1>SHOP MORE, GET MORE</h1>
    </header>
    <main>
        <section class="categories">
            <div class="category-card" style="background-color: #e0f0ff;">Plush Toys</div>
            <div class="category-card" style="background-color: #b3e0ff;">Clothing</div>
            <div class="category-card" style="background-color: #80ccff;">Electronics</div>
            <div class="category-card" style="background-color: #4db8ff;">General Merchandise</div>
        </section>
        <section class="branding">
            <h2>Our Brands</h2>
            <div class="brand-logos">
                <!-- Add brand logos here -->
                <img src="brand1-logo.png" alt="Brand 1">
                <img src="brand2-logo.png" alt="Brand 2">
            </div>
        </section>
        <section class="packaging">
            <h2>Packaging Mockups</h2>
            <img src="packaging-mockup.png" alt="Packaging Mockup">
        </section>
        <section class="previews">
            <h2>Interface Previews</h2>
            <div class="preview">
                <img src="mobile-preview.png" alt="Mobile Interface Preview">
                <img src="web-preview.png" alt="Web Interface Preview">
            </div>
        </section>
    </main>
    <footer>
        <p>Attribution: Zhihua & Dongxin</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
